<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil - Cafunfo</title>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
  padding:20px;
  margin:0;
}

.perfil{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
  text-align:center;
}

img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #22c55e;
}

button{
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.editar{
  background:#3b82f6;
  color:white;
}

.foto{
  background:#22c55e;
  color:white;
}

.voltar{
  background:#6b7280;
  color:white;
  margin-top:15px;
}

.produtos{
  margin-top:20px;
}
</style>
</head>
<body>

<div class="perfil">

  <img id="fotoPerfil" src="https://via.placeholder.com/120">

  <h2 id="nomePerfil">Sem Nome</h2>

  <p><strong>Apelido:</strong> <span id="apelido"></span></p>
  <p><strong>Província:</strong> <span id="provincia"></span></p>
  <p><strong>Bairro:</strong> <span id="bairro"></span></p>
  <p><strong>Função:</strong> <span id="funcao"></span></p>

  <button class="editar" onclick="editarNome()">Editar Nome</button>
  <button class="foto" onclick="document.getElementById('inputFoto').click()">Carregar Foto</button>

  <input type="file" id="inputFoto" accept="image/*" style="display:none" onchange="carregarFoto(event)">

  <br>
  <button class="voltar" onclick="history.back()">⬅ Voltar ao Menu</button>

</div>

<div class="produtos">
  <h3>Meus Produtos</h3>
  <div id="listaProdutos"></div>
</div>

<script>
// Carregar dados salvos
let usuario = JSON.parse(localStorage.getItem("usuario")) || {};

document.getElementById("nomePerfil").innerText = usuario.nome || "Sem Nome";
document.getElementById("apelido").innerText = usuario.apelido || "";
document.getElementById("provincia").innerText = usuario.provincia || "";
document.getElementById("bairro").innerText = usuario.bairro || "";
document.getElementById("funcao").innerText = usuario.funcao || "";

if(usuario.foto){
  document.getElementById("fotoPerfil").src = usuario.foto;
}

// Editar nome
function editarNome(){
  let novoNome = prompt("Digite seu novo nome:");
  if(novoNome){
    usuario.nome = novoNome;
    localStorage.setItem("usuario", JSON.stringify(usuario));
    document.getElementById("nomePerfil").innerText = novoNome;
  }
}

// Carregar foto
function carregarFoto(event){
  let reader = new FileReader();
  reader.onload = function(){
    usuario.foto = reader.result;
    localStorage.setItem("usuario", JSON.stringify(usuario));
    document.getElementById("fotoPerfil").src = reader.result;
  }
  reader.readAsDataURL(event.target.files[0]);
}

// Mostrar produtos do usuário
function carregarProdutos(){
  let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
  let container = document.getElementById("listaProdutos");
  container.innerHTML = "";

  produtos.forEach(produto=>{
    let div = document.createElement("div");
    div.innerHTML = `
      <p><strong>${produto.nome}</strong></p>
      <p>${produto.preco} AKZ</p>
      <hr>
    `;
    container.appendChild(div);
  });
}

carregarProdutos();
</script>

</body>
</html>
