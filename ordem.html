<script>

let ordem = JSON.parse(localStorage.getItem("ordemAtual"));

if(!ordem){
  document.body.innerHTML = "<h3>Nenhuma ordem encontrada.</h3>";
}

// Mostrar dados
document.getElementById("dados").innerHTML = `
  <h3>${ordem.nome}</h3>
  <p>Preço: ${ordem.preco}</p>
  <p>Status: Ordem enviada</p>
`;

/* 📍 COORDENADAS DO CAFUNFO (aproximado) */
let cafunfoBounds = [
  [-8.770, 20.400], // SUL-OESTE
  [-8.720, 20.470]  // NORTE-LESTE
];

/* Criar mapa já focado no Cafunfo */
let map = L.map('map', {
  maxBounds: cafunfoBounds,
  maxBoundsViscosity: 1.0
}).fitBounds(cafunfoBounds);

/* Mapa base */
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  minZoom: 13,
  maxZoom: 18
}).addTo(map);

// 🔴 VENDEDOR
L.circleMarker([ordem.vendedorLat, ordem.vendedorLon], {
  color: 'red',
  radius:8
}).addTo(map).bindPopup("Vendedor");

// 🟢 COMPRADOR
navigator.geolocation.getCurrentPosition(function(position){

  let lat = position.coords.latitude;
  let lon = position.coords.longitude;

  L.circleMarker([lat, lon], {
    color: 'green',
    radius:8
  }).addTo(map).bindPopup("Você (Comprador)").openPopup();

});

</script>
