<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado - Cafunfo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  margin: 0;
  padding: 15px;
}

.card {
  background: #fff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

strong {
  color: green;
  font-size: 18px;
}

button {
  padding: 10px;
  width: 100%;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

#map {
  height: 350px;
  margin-top: 20px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<h2>🛒 Mercado Cafunfo</h2>
<div id="listaProdutos"></div>

<h3 id="tituloMapa" style="display:none;">📍 Localização da Ordem</h3>
<div id="map"></div>

<script>

// 📍 LIMITES DO CAFUNFO
let cafunfoBounds = [
  [-8.770, 20.400], // SUL-OESTE
  [-8.720, 20.470]  // NORTE-LESTE
];

// Produtos exemplo (se não existir nada salvo)
if(!localStorage.getItem("produtos")){
  let exemplo = [
    {
      nome: "iPhone",
      preco: "3000",
      vendedorLat: -8.750,
      vendedorLon: 20.440
    }
  ];
  localStorage.setItem("produtos", JSON.stringify(exemplo));
}

function carregarProdutos(){
  let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
  let container = document.getElementById("listaProdutos");
  container.innerHTML = "";

  produtos.forEach((produto, index) => {
    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${produto.nome}</h3>
      <strong>${produto.preco} AKZ</strong>
      <button onclick="comprar(${index})">Comprar</button>
    `;

    container.appendChild(card);
  });
}

function comprar(index){

  let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
  let produto = produtos[index];

  document.getElementById("map").style.display = "block";
  document.getElementById("tituloMapa").style.display = "block";

  let map = L.map('map', {
    maxBounds: cafunfoBounds,
    maxBoundsViscosity: 1.0
  }).fitBounds(cafunfoBounds);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    minZoom: 14,
    maxZoom: 18
  }).addTo(map);

  // 🔴 VENDEDOR
  L.circleMarker([produto.vendedorLat, produto.vendedorLon], {
    color: 'red',
    radius: 8
  }).addTo(map).bindPopup("Vendedor").openPopup();

  // 🟢 COMPRADOR
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(position){

      let lat = position.coords.latitude;
      let lon = position.coords.longitude;

      L.circleMarker([lat, lon], {
        color: 'green',
        radius: 8
      }).addTo(map).bindPopup("Você (Comprador)");

    });
  }

}

carregarProdutos();

</script>

</body>
</html>
