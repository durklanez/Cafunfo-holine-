<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado - Cafunfo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  padding: 15px;
  margin: 0;
}

.card {
  background: #fff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

img {
  width: 100%;
  height: auto;
  border-radius: 8px;
}

h3 {
  margin: 10px 0 5px 0;
}

p {
  margin: 5px 0;
}

strong {
  color: green;
  font-size: 18px;
}

button {
  padding: 10px;
  width: 100%;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #16a34a;
}

#map {
  height: 350px;
  margin-top: 15px;
  display: none;
  border-radius: 12px;
}

#tituloMapa {
  display: none;
  text-align: center;
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>
<body>

<h2>🛒 Mercado Cafunfo</h2>
<div id="listaProdutos"></div>

<h3 id="tituloMapa">🌍 Localização da Ordem</h3>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Função para carregar produtos
function carregarProdutos(){
  let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
  let container = document.getElementById("listaProdutos");
  container.innerHTML = "";

  if(produtos.length === 0){
    container.innerHTML = "<p>Nenhum produto publicado ainda.</p>";
    return;
  }

  produtos.forEach((produto, index) => {
    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${produto.foto || 'https://via.placeholder.com/300x200'}" alt="${produto.nome}">
      <h3>${produto.nome}</h3>
      <p>${produto.descricao || ''}</p>
      <strong>${produto.preco ? produto.preco + " AKZ" : "Preço não definido"}</strong>
      <button onclick="comprar(${index})">Comprar</button>
    `;

    container.appendChild(card);
  });
}

// Função comprar com mapa limitado ao Cafunfo
function comprar(index){

  let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

  if(!produtos[index]){
    alert("Produto não encontrado.");
    return;
  }

  let produto = produtos[index];

  let mapaDiv = document.getElementById("map");
  let titulo = document.getElementById("tituloMapa");

  mapaDiv.style.display = "block";
  titulo.style.display = "block";

  // Limites Cafunfo (exemplo)
  let cafunfoBounds = [
    [-8.770, 20.400], // SUL-OESTE
    [-8.720, 20.470]  // NORTE-LESTE
  ];

  setTimeout(function(){

    if(window.meuMapa){
      window.meuMapa.remove();
    }

    let map = L.map('map', {
      maxBounds: cafunfoBounds,
      maxBoundsViscosity: 1.0
    }).setView([produto.vendedorLat || -8.745, produto.vendedorLon || 20.440], 15);

    window.meuMapa = map;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // 🔴 Vendedor
    L.marker([produto.vendedorLat || -8.745, produto.vendedorLon || 20.440])
      .addTo(map)
      .bindPopup("📍 Vendedor")
      .openPopup();

    // 🟢 Comprador
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(function(position){
        L.marker([position.coords.latitude, position.coords.longitude])
          .addTo(map)
          .bindPopup("🟢 Você (Comprador)");
      }, function(){
        alert("Permita a localização para mostrar sua posição.");
      });
    }

    setTimeout(function(){
      map.invalidateSize();
    }, 300);

  }, 300);
}

// Carrega produtos assim que abre a página
carregarProdutos();
</script>

</body>
</html>
