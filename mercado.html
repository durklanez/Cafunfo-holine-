<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado - Cafunfo</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:10px;
}

h1{
text-align:center;
}

.produto{

background:white;
border-radius:10px;
padding:10px;
margin-bottom:10px;

display:flex;
justify-content:space-between;
align-items:center;

box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.info{
flex:1;
}

.vendedor{
display:flex;
align-items:center;
margin-bottom:5px;
}

.fotoVendedor{
width:30px;
height:30px;
border-radius:50%;
margin-right:6px;
cursor:pointer;
}

.nomeProduto{
font-size:16px;
font-weight:bold;
}

.preco{
color:green;
font-weight:bold;
}

.descricao{
font-size:13px;
color:#555;
}

.data{
font-size:11px;
color:gray;
}

.fotoProduto{

width:80px;
height:80px;
object-fit:cover;
border-radius:8px;
margin-left:10px;

}

button{

margin-top:5px;
padding:8px 12px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;

}

</style>
</head>

<body>

<h1>Mercado</h1>

<div id="listaProdutos"></div>

<script>

function carregarProdutos(){

let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

let container = document.getElementById("listaProdutos");

container.innerHTML = "";

if(produtos.length === 0){

container.innerHTML="<p>Nenhum produto publicado</p>";

return;

}

/* máximo 5 produtos */

produtos.slice(0,5).forEach(produto=>{

let div=document.createElement("div");

div.className="produto";

div.innerHTML=`

<div class="info">

<div class="vendedor">

<img class="fotoVendedor" src="${produto.fotoVendedor || 'https://via.placeholder.com/30'}"
onclick="abrirPerfil('${produto.vendedor}')">

<span>${produto.vendedor}</span>

</div>

<div class="nomeProduto">${produto.nome}</div>

<div class="preco">${produto.preco} Kz</div>

<div class="descricao">${produto.descricao || ""}</div>

<div class="data">${produto.data || ""}</div>

<button onclick="comprar('${produto.nome}','${produto.vendedor}')">
Comprar
</button>

</div>

<img class="fotoProduto"
src="${produto.foto || 'https://via.placeholder.com/80'}">

`;

container.appendChild(div);

});

}

function abrirPerfil(nome){

localStorage.setItem("verPerfil",nome);

window.location="ver-perfil.html";

}

function comprar(produto,vendedor){

localStorage.setItem("ordemProduto",produto);

localStorage.setItem("ordemVendedor",vendedor);

window.location="enviar-ordem.html";

}

carregarProdutos();

</script>

</body>
</html>
