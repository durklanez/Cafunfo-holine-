<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Mapa Cafunfo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
}
#map {
    height: 100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

// Coordenadas centrais de Cafunfo
var centroCafunfo = [-8.7667, 20.7833];

// Limites aproximados (Norte, Sul, Leste, Oeste)
var limitesCafunfo = L.latLngBounds(
    [-8.80, 20.75],  // Sul-Oeste
    [-8.73, 20.82]   // Norte-Leste
);

// Criar mapa já focado em Cafunfo
var map = L.map('map', {
    center: centroCafunfo,
    zoom: 15,
    minZoom: 14,
    maxZoom: 18,
    maxBounds: limitesCafunfo,
    maxBoundsViscosity: 1.0
});

// Camada do mapa
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'Mapa Cafunfo'
}).addTo(map);

// Marcador central
L.marker(centroCafunfo).addTo(map)
    .bindPopup("📍 Centro de Cafunfo")
    .openPopup();

</script>

</body>
</html>
