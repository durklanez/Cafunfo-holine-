<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f2f2f2;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<input id="nome" placeholder="Seu nome">

<button onclick="login()">Entrar</button>

</div>

<script>

function login(){

let nome = document.getElementById("nome").value;

if(nome==""){
alert("Digite seu nome");
return;
}

localStorage.setItem("usuarioLogado",nome);

window.location="menu.html";

}

</script>

</body>
</html>
